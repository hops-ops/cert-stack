apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: certstacks.hops.ops.com.ai
spec:
  group: hops.ops.com.ai
  names:
    kind: CertStack
    plural: certstacks
  scope: Namespaced
  versions:
  - name: v1alpha1
    referenceable: true
    served: true
    schema:
      openAPIV3Schema:
        description: CertStack installs cert-manager onto a target Kubernetes cluster as a Helm release. Cloud-specific DNS-01 plumbing (e.g. AWS Route53 PodIdentity, Cloudflare API tokens) lives in the corresponding DNS stack — this stack is intentionally cloud-neutral.
        type: object
        properties:
          spec:
            description: CertStackSpec defines the desired state.
            type: object
            properties:
              clusterName:
                description: Name of the target cluster. Used as default for helmProviderConfigRef.name and resource naming.
                type: string
              managementPolicies:
                description: Management policies for all composed resources. Defaults to ["*"].
                type: array
                items:
                  type: string
                default:
                - "*"
              labels:
                description: Custom labels applied to all managed resources.
                type: object
                additionalProperties:
                  type: string
                x-kubernetes-preserve-unknown-fields: true
              helmProviderConfigRef:
                description: Reference to the Helm ProviderConfig. Defaults to clusterName.
                type: object
                properties:
                  name:
                    type: string
                  kind:
                    type: string
                    enum:
                    - ProviderConfig
                    - ClusterProviderConfig
              namespace:
                description: Namespace for the cert-manager Helm release. Defaults to "cert-manager".
                type: string
              releaseName:
                description: Helm release name. Defaults to "cert-manager".
                type: string
              chartVersion:
                description: cert-manager chart version. Defaults to v1.19.2.
                type: string
              values:
                description: Helm values merged on top of chart defaults.
                type: object
                x-kubernetes-preserve-unknown-fields: true
              overrideAllValues:
                description: Helm values that replace all defaults entirely.
                type: object
                x-kubernetes-preserve-unknown-fields: true
            required:
            - clusterName
          status:
            description: CertStackStatus defines the observed state.
            type: object
            properties:
              ready:
                description: Whether the cert-manager Helm release is healthy.
                type: boolean
        required:
        - spec
