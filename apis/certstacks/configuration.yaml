apiVersion: meta.pkg.crossplane.io/v1alpha1
kind: Configuration
metadata:
  name: cert-stack
  annotations:
    meta.crossplane.io/maintainer: Patrick Lee Scott
    meta.crossplane.io/source: github.com/hops-ops/cert-stack
    meta.crossplane.io/description: Installs cert-manager onto a target Kubernetes cluster as a Helm release. Cloud-neutral — DNS-01 plumbing lives in the corresponding DNS stack.
spec:
  dependsOn:
  - function: xpkg.crossplane.io/crossplane-contrib/function-auto-ready
    version: '>=v0.6.3'
  - provider: xpkg.crossplane.io/crossplane-contrib/provider-helm
    version: '>=v1'
