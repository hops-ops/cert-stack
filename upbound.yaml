apiVersion: meta.dev.upbound.io/v2alpha1
kind: Project
metadata:
  name: cert-stack
spec:
  dependsOn:
  - apiVersion: pkg.crossplane.io/v1
    kind: Function
    package: xpkg.crossplane.io/crossplane-contrib/function-auto-ready
    version: '>=v0.6.3'
  - apiVersion: pkg.crossplane.io/v1
    kind: Provider
    package: xpkg.crossplane.io/crossplane-contrib/provider-helm
    version: '>=v1'
  description: Installs cert-manager onto a target Kubernetes cluster as a Helm release.
    Cloud-neutral — DNS-01 plumbing (Route53 PodIdentity, Cloudflare API token) lives
    in the corresponding DNS stack (aws-dnsstack, cloudflare-dnsstack).
  license: Apache-2.0
  maintainer: Patrick Lee Scott <pat@patscott.io>
  readme: |
    # cert-stack

    Single-claim install of cert-manager onto a target Kubernetes cluster.

    Composes:
    - cert-manager Helm release

    Cloud-specific DNS-01 plumbing is owned by the corresponding DNS stack:
    - aws-dnsstack — composes the Route53 PodIdentity binding the cert-manager
      ServiceAccount to an IAM role with Route53 ChangeResourceRecordSets /
      ListHostedZonesByName / GetChange permissions, plus the Let's Encrypt
      ClusterIssuer.
    - cloudflare-dnsstack — wires the Cloudflare API token Secret consumed by
      cert-manager's Cloudflare DNS-01 solver, plus the Let's Encrypt
      ClusterIssuer.
  repository: ghcr.io/hops-ops/cert-stack
  source: github.com/hops-ops/cert-stack
