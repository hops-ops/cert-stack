apiVersion: meta.dev.upbound.io/v2alpha1
kind: Project
metadata:
  name: cert-manager-stack
spec:
  dependsOn:
  - apiVersion: pkg.crossplane.io/v1
    kind: Function
    package: xpkg.crossplane.io/crossplane-contrib/function-auto-ready
    version: '>=v0.6.3'
  - apiVersion: pkg.crossplane.io/v1
    kind: Provider
    package: xpkg.crossplane.io/crossplane-contrib/provider-helm
    version: '>=v1'
  description: Installs cert-manager as a single Helm release on a target Kubernetes
    cluster. No AWS dependencies. For DNS-01 / Route53 ClusterIssuers, use the aws-external-dns-stack
    instead (or in addition).
  license: Apache-2.0
  maintainer: Patrick Lee Scott <pat@patscott.io>
  readme: |
    # cert-manager-stack

    Single-claim install of cert-manager onto a target Kubernetes cluster.
    Composes one Helm release; no AWS dependencies.

    Use this when you need cert-manager (CRDs + controller) but not Route53
    DNS-01 ClusterIssuers or ExternalDNS. For the full DNS+TLS bundle on
    AWS, use aws-external-dns-stack which embeds cert-manager when
    `spec.certManager.enabled: true`.
  repository: ghcr.io/hops-ops/cert-manager-stack
  source: github.com/hops-ops/cert-manager-stack
